<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>¿Me lo puedo permitir?</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap');
:root{--bg:#F7F4EF;--bg2:#EDE9E1;--bg3:#E4DED3;--ink:#1A1814;--ink2:#5C5750;--ink3:#9A9188;--border:#D9D3C8;--border2:#B8B0A2;--verde:#2D6A2D;--verde-bg:#EAF2E8;--amarillo:#7A5200;--amarillo-bg:#FBF0DC;--rojo:#8B1A1A;--rojo-bg:#FAEAEA;--accent:#C8602A;--radius:10px;--radius-sm:6px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;font-size:15px;line-height:1.5;min-height:100vh}
#shell{max-width:500px;margin:0 auto;padding:2rem 1.25rem 4rem}
.header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2rem}
.wordmark{font-family:'DM Serif Display',serif;font-size:18px;color:var(--ink)}
.step-counter{font-size:11px;color:var(--ink3);font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.prog-wrap{margin-bottom:2.25rem}.prog-track{height:2px;background:var(--bg3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--ink);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.fade{animation:up .3s ease both}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.eyebrow{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.6rem}
.q-head{font-family:'DM Serif Display',serif;font-size:26px;color:var(--ink);line-height:1.25;margin-bottom:.4rem}
.q-sub{font-size:13px;color:var(--ink2);margin-bottom:1.75rem;line-height:1.6}
.opts{display:grid;gap:7px;margin-bottom:1.75rem}
.opt{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:13px 16px;text-align:left;cursor:pointer;font-size:14px;color:#1A1814;font-family:'Inter',sans-serif;font-weight:500;transition:all .14s;display:flex;align-items:center;gap:11px;position:relative;width:100%}
.opt:hover{background:#1A1814;color:#fff;border-color:#1A1814}
.opt.sel{background:#1A1814;color:#fff;border-color:#1A1814}
.opt.sel::after{content:'✓';position:absolute;right:14px;font-size:13px;font-weight:700;color:#fff}
.opt-ico{font-size:19px;flex-shrink:0;width:26px;text-align:center}
.field{margin-bottom:1.25rem}
.field label{display:block;font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
.field input,.field textarea,.field select{width:100%;font-size:17px;font-family:'Inter',sans-serif;font-weight:500;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:#fff;color:var(--ink);outline:none;-webkit-appearance:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(26,24,20,.07)}
.field textarea{resize:none;min-height:100px;font-size:14px;line-height:1.65;font-weight:400}
.field select{cursor:pointer;font-size:15px;font-weight:400}
.field-hint{font-size:12px;color:var(--ink3);margin-top:6px;line-height:1.5}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-primary{width:100%;padding:14px;background:var(--ink);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:opacity .14s;margin-top:.35rem}
.btn-primary:hover{opacity:.82}.btn-primary:disabled{opacity:.28;cursor:not-allowed}
.btn-back{background:none;border:none;font-size:12px;color:var(--ink3);cursor:pointer;font-family:'Inter',sans-serif;padding:0;margin-top:1rem;display:flex;align-items:center;gap:5px}
.btn-back:hover{color:var(--ink2)}
.btn-toggle{background:none;border:none;font-size:12px;color:var(--ink2);cursor:pointer;font-family:'Inter',sans-serif;padding:0;margin-bottom:1rem;text-decoration:underline;text-underline-offset:3px}
.detail{background:var(--bg2);border-radius:var(--radius-sm);padding:14px;margin-bottom:1.25rem;display:none;border:1px solid var(--border)}
.detail.open{display:block}
.sep{height:1px;background:var(--border);margin:10px 0}
.calc-preview{font-size:13px;color:var(--ink2);margin-bottom:1rem;font-weight:500;padding:8px 12px;background:var(--bg2);border-radius:var(--radius-sm);display:none}
.calc-preview.show{display:block}

/* NOTICIAS */
.news-block{margin-top:1.5rem;border-top:1px solid var(--border);padding-top:1.25rem}
.news-eyebrow{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
.news-item{margin-bottom:.85rem;padding:10px 12px;background:#fff;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer}
.news-context{font-size:11px;color:var(--ink3);margin-bottom:3px;font-weight:500}
.news-title{font-size:13px;color:var(--ink);font-weight:600;line-height:1.4}
.news-meta{font-size:11px;color:var(--ink3);margin-top:3px}
.news-loading{font-size:13px;color:var(--ink3);display:flex;align-items:center;gap:8px;padding:8px 0}
.news-spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--ink3);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* TENSIÓN */
.tension{text-align:center;padding:3.5rem 1rem;animation:up .4s ease both}
.t-icon{font-size:52px;margin-bottom:1.25rem;display:block;animation:breathe 1.4s ease infinite}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.t-title{font-family:'DM Serif Display',serif;font-size:26px;color:var(--ink);margin-bottom:.6rem;line-height:1.25}
.t-msg{font-size:13px;color:var(--ink2);margin-bottom:2rem;line-height:1.6;min-height:20px}
.t-track{height:2px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:.4rem}
.t-fill{height:100%;border-radius:2px;transition:width .08s linear}
.t-fill.verde{background:var(--verde)}.t-fill.amarillo{background:#C89020}.t-fill.rojo{background:#C03030}
.t-pct{font-size:11px;color:var(--ink3);text-align:right}

/* RESULTADO */
.result{animation:up .4s ease both}
.res-eyebrow{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:1rem}
.semaforo{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.semaforo.verde{background:var(--verde-bg)}.semaforo.amarillo{background:var(--amarillo-bg)}.semaforo.rojo{background:var(--rojo-bg)}
.res-title{font-family:'DM Serif Display',serif;font-size:28px;color:var(--ink);line-height:1.2;margin-bottom:0}
.res-body{font-size:14px;color:var(--ink2);line-height:1.75;margin-bottom:1rem}
.punch{padding:16px 18px;border-radius:var(--radius);margin-bottom:1.25rem;font-size:14px;line-height:1.7;font-weight:500}
.punch.verde{background:var(--verde-bg);color:var(--verde);border-left:3px solid var(--verde)}
.punch.amarillo{background:var(--amarillo-bg);color:var(--amarillo);border-left:3px solid #C89020}
.punch.rojo{background:var(--rojo-bg);color:var(--rojo);border-left:3px solid #C03030}

/* TIPS GRATUITOS */
.tips-section{margin-bottom:1.25rem}
.tips-eyebrow{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.85rem}
.tip-item{display:flex;gap:10px;margin-bottom:.85rem;padding:12px 14px;background:#fff;border-radius:var(--radius-sm);border:1px solid var(--border)}
.tip-num{font-family:'DM Serif Display',serif;font-size:22px;color:var(--border2);flex-shrink:0;line-height:1}
.tip-content{}
.tip-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px}
.tip-body{font-size:12px;color:var(--ink2);line-height:1.5}

.numero-card{background:var(--ink);color:#fff;border-radius:var(--radius);padding:20px 22px;margin-bottom:1.25rem}
.numero-eyebrow{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;opacity:.5;margin-bottom:4px}
.numero-val{font-family:'DM Serif Display',serif;font-size:38px;letter-spacing:-.02em;line-height:1}
.numero-desc{font-size:12px;opacity:.6;margin-top:8px;line-height:1.5}
.inds{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.ind{background:#fff;border-radius:var(--radius-sm);padding:12px;text-align:center;border:1px solid var(--border)}
.ind-val{font-family:'DM Serif Display',serif;font-size:22px;color:var(--ink);line-height:1}
.ind-val.neg{color:#C03030}
.ind-lbl{font-size:10px;color:var(--ink3);margin-top:4px;line-height:1.35;font-weight:500;letter-spacing:.03em;text-transform:uppercase}
.social{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;margin-bottom:1.25rem;display:flex;align-items:flex-start;gap:10px}
.social-ico{font-size:18px;flex-shrink:0;margin-top:1px}
.social-txt{font-size:13px;color:var(--ink2);line-height:1.55}
.social-txt strong{color:var(--ink)}
.ia-note{font-size:13px;color:var(--ink2);background:#fff;border-radius:var(--radius-sm);padding:13px 15px;margin-bottom:1.25rem;line-height:1.65;border-left:2px solid var(--border2)}
.divider{height:1px;background:var(--border);margin:1.5rem 0}

/* CTA PDF */
.cta-box{border:1px solid var(--border);border-radius:var(--radius);padding:22px;text-align:center;background:#fff}
.cta-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:rgba(200,96,42,.08);border-radius:4px;padding:3px 10px;margin-bottom:12px}
.cta-title{font-family:'DM Serif Display',serif;font-size:21px;color:var(--ink);margin-bottom:8px;line-height:1.3}
.cta-sub{font-size:13px;color:var(--ink2);margin-bottom:16px;line-height:1.6}
.cta-list{text-align:left;margin-bottom:18px;display:grid;gap:5px}
.cta-list span{font-size:13px;color:var(--ink2);display:flex;gap:8px;line-height:1.45}
.cta-list span::before{content:'→';color:var(--accent);flex-shrink:0;font-weight:600}
.btn-buy{width:100%;padding:15px;background:var(--ink);color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-buy:hover{opacity:.83}
.email-row{margin-top:12px;display:flex;gap:8px}
.email-row input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Inter',sans-serif;background:#fff;color:var(--ink);outline:none}
.btn-email{padding:10px 14px;background:none;color:var(--ink2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;white-space:nowrap}
.btn-email:hover{background:var(--bg2)}
.cta-footnote{font-size:11px;color:var(--ink3);margin-top:7px}
.btn-restart{background:none;border:none;font-size:12px;color:var(--ink3);cursor:pointer;font-family:'Inter',sans-serif;padding:0;text-align:center;width:100%;margin-top:1rem}

.btn-test{position:fixed;bottom:16px;right:16px;background:#6B4700;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;z-index:9999;opacity:0.85;}
.btn-test:hover{opacity:1;}
</style>
</head>
<body>
<div id="shell">
  <div class="header"><span class="wordmark">melopuedopermitir.com</span><span class="step-counter" id="stepLabel"></span></div>
  <div class="prog-wrap"><div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div></div>
  <div id="content"></div>
</div>
<script>
var S={step:0,a:{},newsCache:{}};
var STEPS=[
  {id:'bienvenida',type:'bienvenida'},
  {id:'tipo_gasto',type:'opts',ey:'Empecemos',q:'¿Qué quieres analizar?',opts:[{v:'hijo',l:'Tener un hijo o guardería',i:'🍼'},{v:'vivienda',l:'Cambiar de piso o comprar vivienda',i:'🏠'},{v:'coche',l:'Comprar un coche',i:'🚗'},{v:'formacion',l:'Pagar una formación',i:'📚'},{v:'capricho',l:'Un capricho concreto',i:'✨'},{v:'otro',l:'Otro gasto',i:'💰'}]},
  {id:'gasto_screen',type:'gasto_custom'},
  {id:'ingresos',type:'number',ey:'Ingresos',q:'¿Cuánto entra en casa cada mes?',sub:'Suma todos los ingresos netos del hogar, después de impuestos.',ph:'2800',unit:'€ netos al mes'},
  {id:'estabilidad',type:'opts',ey:'Situación laboral',q:'¿Cómo es vuestra situación laboral?',opts:[{v:'indefinido',l:'Indefinido o funcionario',i:'🏛️'},{v:'autonomo',l:'Autónomo',i:'💼'},{v:'temporal',l:'Temporal o por proyecto',i:'📋'},{v:'mixto',l:'Combinación de varias',i:'🔀'}]},
  {id:'vivienda_bloque',type:'vivienda_custom'},
  {id:'transporte_bloque',type:'transporte_custom'},
  {id:'vida_bloque',type:'vida_custom'},
  {id:'ocio_bloque',type:'ocio_custom'},
  {id:'deudas_bloque',type:'deudas_custom'},
  {id:'ahorro_bloque',type:'ahorro_custom'},
  {id:'texto_libre',type:'texto_libre'}
];
var TOTAL=STEPS.length;
function prog(){return Math.round(((S.step+1)/TOTAL)*100);}
function cur(){return STEPS[S.step];}
function getNum(k){return parseFloat(S.a[k])||0;}
function gVal(k,d){return S.a[k]!==undefined&&S.a[k]!==''?S.a[k]:(d||'');}
function next(){if(S.step<STEPS.length-1){S.step++;render();

// Comprobar si viene de pago exitoso
(function() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('pago') === 'ok') {
    setTimeout(function() {
      alert('¡Pago completado! En unos minutos recibirás el informe en tu email.');
    }, 500);
  }
})();
fetchNewsForStep();}else{runCalc();}}
function back(){if(S.step>0){S.step--;render();

// Comprobar si viene de pago exitoso
(function() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('pago') === 'ok') {
    setTimeout(function() {
      alert('¡Pago completado! En unos minutos recibirás el informe en tu email.');
    }, 500);
  }
})();
}}
function selOpt(id,v){S.a[id]=v;document.querySelectorAll('.opt[data-group="'+id+'"]').forEach(function(b){b.classList.toggle('sel',b.dataset.val===v);});setTimeout(function(){next();},200);}
function selVivienda(v){S.a.viv_tipo=v;document.querySelectorAll('.opt[data-group="viv_tipo"]').forEach(function(b){b.classList.toggle('sel',b.dataset.val===v);});var viw=document.getElementById('viw');if(viw)viw.style.display=(v==='nada'?'none':'block');}
function selTransporte(v){S.a.trans_tipo=v;document.querySelectorAll('.opt[data-group="trans_tipo"]').forEach(function(b){b.classList.toggle('sel',b.dataset.val===v);});var tc=document.getElementById('tc'),tp=document.getElementById('tp');if(tc)tc.style.display=(v!=='publico'?'block':'none');if(tp)tp.style.display=(v!=='coche'?'block':'none');}
function selDeuda(v){S.a.tiene_deudas=v;document.querySelectorAll('.opt[data-group="tiene_deudas"]').forEach(function(b){b.classList.toggle('sel',b.dataset.val===v);});var dw=document.getElementById('dw');if(dw)dw.style.display=(v==='si'?'block':'none');}
function selCapricho(v){
  S.a.pago_capricho=v;
  document.querySelectorAll('.opt[data-group="pago_capricho"]').forEach(function(b){b.classList.toggle('sel',b.dataset.val===v);});
  var pw=document.getElementById('plazos_wrap');
  if(pw)pw.style.display=(v==='plazos'?'grid':'none');
  calcCapricho();
}
function calcCapricho(){
  var total=parseFloat(S.a.precio_total_capricho)||0;
  var preview=document.getElementById('capricho_preview');
  if(!preview||!total) return;
  if(S.a.pago_capricho==='unico'||!S.a.pago_capricho){
    var mensual=Math.round(total/12);
    S.a.importe_gasto=String(mensual);
    preview.className='calc-preview show';
    preview.textContent='Coste mensual equivalente (a 12 meses): '+mensual.toLocaleString('es-ES')+' €/mes';
  } else if(S.a.pago_capricho==='plazos'&&S.a.meses_capricho){
    var cuota=Math.round(total/parseFloat(S.a.meses_capricho));
    S.a.importe_gasto=String(cuota);
    preview.className='calc-preview show';
    preview.textContent='Cuota mensual: '+cuota.toLocaleString('es-ES')+' €/mes durante '+S.a.meses_capricho+' meses';
  }
}
function selPagoCoche(v){S.a.pago_coche=v;document.querySelectorAll('.opt[data-group="pago_coche"]').forEach(function(b){b.classList.toggle('sel',b.dataset.val===v);});var fw=document.getElementById('fin_wrap');if(fw)fw.style.display=(v==='financiado'?'grid':'none');calcCuota();}
function onNum(id,v){S.a[id]=v;var btn=document.getElementById('btnMain');if(btn)btn.disabled=!v||parseFloat(v)<=0;}
function toggleDetail(id){var el=document.getElementById(id);el.classList.toggle('open');event.currentTarget.textContent=el.classList.contains('open')?'▲ Ocultar detalle':'▼ Añadir más detalle';}
function updateLabel(){document.getElementById('stepLabel').textContent=(S.step+1)+' / '+TOTAL;document.getElementById('progFill').style.width=prog()+'%';}

/* NOTICIAS EN TIEMPO REAL */
function buildNewsContext(){
  var ctx='Usuario: '+gVal('nombre','alguien')+', vive en '+gVal('ciudad','España')+' ('+gVal('pais','España')+').';
  if(S.a.tipo_gasto)ctx+=' Está analizando si puede permitirse: '+S.a.tipo_gasto+'.';
  if(S.a.ingresos)ctx+=' Ingresos mensuales: '+S.a.ingresos+'€.';
  if(S.a.estabilidad)ctx+=' Situación laboral: '+S.a.estabilidad+'.';
  if(S.a.viv_tipo)ctx+=' Vivienda: '+S.a.viv_tipo+(S.a.viv_importe?' de '+S.a.viv_importe+'€/mes':'')+'.';
  if(S.a.trans_tipo)ctx+=' Transporte: '+S.a.trans_tipo+'.';
  if(S.a.tiene_deudas==='si')ctx+=' Tiene préstamos activos.';
  return ctx;
}

function fetchNewsForStep(){
  var newsDiv=document.getElementById('news-container');
  if(!newsDiv)return;
  var cacheKey=S.step+'_'+JSON.stringify(S.a).length;
  if(S.newsCache[cacheKey]){newsDiv.innerHTML=S.newsCache[cacheKey];return;}
  newsDiv.innerHTML='<div class="news-loading"><div class="news-spin"></div><span>Buscando noticias que te afectan...</span></div>';
  var ctx=buildNewsContext();
  var prompt='Eres un asistente financiero personal. Basándote en este perfil de usuario: "'+ctx+'"\n\nBusca en internet 3 noticias MUY recientes (últimas semanas) que sean directamente relevantes para esta persona concreta. Para cada noticia escribe EXACTAMENTE en este formato JSON:\n[{"contexto":"Por qué le afecta esto (max 8 palabras)","titular":"Titular reescrito en tono de amigo, con gancho, que pique la curiosidad (max 15 palabras)","fuente":"Nombre del medio","fecha":"hace X días/hoy/esta semana"}]\nSolo JSON, sin explicaciones. El titular debe hablar directamente a la situación del usuario, no ser genérico.';
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:prompt}]})})
  .then(function(r){return r.json();})
  .then(function(d){
    var text='';
    if(d.content)d.content.forEach(function(c){if(c.type==='text')text+=c.text;});
    try{
      var clean=text.replace(/```json|```/g,'').trim();
      var start=clean.indexOf('['),end=clean.lastIndexOf(']');
      if(start>=0&&end>=0)clean=clean.substring(start,end+1);
      var news=JSON.parse(clean);
      var html='<div class="news-block"><div class="news-eyebrow">📡 Noticias que te afectan a ti</div>';
      news.forEach(function(n){
        html+='<div class="news-item"><div class="news-context">'+n.contexto+'</div><div class="news-title">'+n.titular+'</div><div class="news-meta">'+n.fuente+' · '+n.fecha+'</div></div>';
      });
      html+='</div>';
      S.newsCache[cacheKey]=html;
      if(document.getElementById('news-container'))document.getElementById('news-container').innerHTML=html;
    }catch(e){if(document.getElementById('news-container'))document.getElementById('news-container').innerHTML='';}
  })
  .catch(function(){if(document.getElementById('news-container'))document.getElementById('news-container').innerHTML='';});
}

function attachEnter(){
  setTimeout(function(){
    document.querySelectorAll('input[type="number"],input[type="text"]').forEach(function(inp){
      inp.addEventListener('keydown',function(e){
        if(e.key==='Enter'){e.preventDefault();var btn=document.getElementById('btnMain');if(btn&&!btn.disabled){btn.click();return;}var btns=document.querySelectorAll('.btn-primary');btns.forEach(function(b){if(!b.disabled)b.click();});}
      });
    });
  },120);
}

function render(){
  updateLabel();
  var step=cur();
  var h='<div class="fade">';

  if(step.type==='bienvenida'){

function calcCuota(){
  var vcEl=document.getElementById('val_coche');
  var val=parseFloat(vcEl?vcEl.value:0)||parseFloat(S.a.val_coche)||0;
  var entrada=parseFloat(S.a.entrada_coche)||0,anos=parseFloat(S.a.anos_coche)||0;
  var preview=document.getElementById('cuota_preview');if(!preview)return;
  if(S.a.pago_coche==='contado'){S.a.importe_gasto=val>0?String(Math.round(val/60)):'0';preview.className='calc-preview'+(val>0?' show':'');preview.textContent=val>0?'Coste mensual equivalente: '+Math.round(val/60).toLocaleString('es-ES')+' €':'';return;}
  if(val>0&&anos>0){var r=0.07/12,n=anos*12,f=val-entrada,c=f*r/(1-Math.pow(1+r,-n));S.a.importe_gasto=String(Math.round(c));preview.className='calc-preview show';preview.textContent='Cuota mensual estimada: '+Math.round(c).toLocaleString('es-ES')+' € (TAE ~7%)';}
  else{preview.className='calc-preview';preview.textContent='';}
}

function validarGasto(){
  if(S.a.tipo_gasto==='coche'){
    if(!S.a.val_coche||parseFloat(S.a.val_coche)<=0){alert('Introduce el valor del coche');return;}
    if(!S.a.pago_coche){alert('¿Lo pagas al contado o financiado?');return;}
    if(S.a.pago_coche==='financiado'&&!S.a.anos_coche){alert('¿En cuántos años lo financias?');return;}
    calcCuota();
  } else if(S.a.tipo_gasto==='capricho'||S.a.tipo_gasto==='otro'){
    if(!S.a.precio_total_capricho||parseFloat(S.a.precio_total_capricho)<=0){alert('Introduce el precio del gasto');return;}
    if(!S.a.pago_capricho){alert('¿Lo pagas de una vez o a plazos?');return;}
    if(S.a.pago_capricho==='plazos'&&!S.a.meses_capricho){alert('¿En cuántos meses lo pagas?');return;}
    calcCapricho();
  } else {
    if(!S.a.importe_gasto||parseFloat(S.a.importe_gasto)<=0){alert('Introduce el coste mensual');return;}
  }
  next();
}

function calcular(){
  var ing=getNum('ingresos'),gn=getNum('importe_gasto');
  var viv=S.a.viv_tipo==='nada'?0:getNum('viv_importe');
  var vx=getNum('viv_comunidad')+getNum('viv_seguro')+getNum('viv_luz')+getNum('viv_agua')+getNum('viv_internet');
  var trans=getNum('trans_gasolina')+(getNum('trans_seguro_anual')/12)+getNum('trans_parking')+(getNum('trans_itv_anual')/12)+getNum('trans_publico');
  var vida=getNum('vida_super')+getNum('vida_medico')+getNum('vida_farmacia')+getNum('vida_colegio')+getNum('vida_extra')+getNum('vida_mascota')+getNum('vida_familia');
  var ocio=getNum('ocio_fuera')+getNum('ocio_ropa')+getNum('ocio_subs')+getNum('ocio_otros')+(getNum('ocio_viajes_anual')/12);
  var deudas=S.a.tiene_deudas==='si'?getNum('deudas_total'):0;
  var ahorro=getNum('ahorro_mensual'),colchon=getNum('colchon_total');
  var gf=viv+vx+trans+deudas,gv=vida+ocio+ahorro,margen=ing-(gf+gv+gn);
  var ratio=ing>0?((gf+gn)/ing)*100:100,gmes=gf+gv,cmeses=gmes>0?colchon/gmes:0,ns=Math.round(gmes*3);
  var frag=0;
  if(S.a.estabilidad==='temporal')frag+=1;if(S.a.estabilidad==='autonomo')frag+=0.5;if(S.a.estabilidad==='mixto')frag+=0.25;
  var color='verde';
  if(ratio>65||margen<100||cmeses<1)color='rojo';else if(ratio>50||margen<300||cmeses<2)color='amarillo';
  if(frag>=1&&color==='verde')color='amarillo';if(frag>=1.5&&color==='amarillo')color='rojo';
  return{ratio:ratio,margen:margen,cmeses:cmeses,ns:ns,color:color,ing:ing,gn:gn,gmes:gmes};
}

function getPunch(res){
  var m=Math.round(res.margen),col=res.cmeses,est=S.a.estabilidad,g=Math.round(res.gn);
  var nombre=gVal('nombre','');
  var prefix=nombre?nombre+', ':'';
  if(res.color==='verde'){
    if(col>=6)return prefix+'con '+Math.round(res.ing).toLocaleString('es-ES')+'€ al mes y '+Math.round(col)+' meses de colchón, puedes asumir esto y seguir durmiendo bien.';
    if(col>=3)return 'Los números cuadran. La única pregunta real es si este gasto te aporta lo que crees que te va a aportar.';
    return 'Puedes permitírtelo, pero tu colchón es justo. Asúmelo, pero no dejes de ahorrar.';
  }
  if(res.color==='amarillo'){
    if(est==='temporal')return 'Técnicamente puedes pagarlo, pero con contrato temporal y este margen tan ajustado, un mes sin trabajo te deja contra las cuerdas.';
    if(m<200)return 'Te quedarían solo '+m+'€ al mes después de todo. Muy poco para lo que puede pasar.';
    return 'Puedes asumirlo, pero pasas de tener respiro a estar al límite. ¿Merece la pena?';
  }
  if(res.margen<0)return 'Cada mes gastarías '+Math.abs(m).toLocaleString('es-ES')+'€ más de lo que entra. Añadir '+g.toLocaleString('es-ES')+'€ más no es tensar la cuerda — es romperla.';
  if(col<1)return 'Sin colchón y con los compromisos al límite, cualquier imprevisto te pone en una situación muy difícil.';
  return 'Los números dicen que no es el momento. Asumir esto ahora significaría vivir sin red.';
}

function sendEmail(){
  var e=document.getElementById('emailInp').value;
  if(!e||e.indexOf('@')<0){document.getElementById('emailInp').style.borderColor='#C03030';return;}
  var row=document.querySelector('.email-row');
  row.insertAdjacentHTML('afterend','<div style="font-size:13px;color:#5C5750;padding:6px 0;text-align:center">✅ Resumen enviado a '+e+'</div>');
  row.remove();
}
